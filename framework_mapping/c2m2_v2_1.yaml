      mil: 2
      text: Indicators of anomalous activity are established and maintained based on system logs, data
        flows, network baselines, cybersecurity events, and architecture and are monitored across the
        IT and OT environments
    - id: SITUATION-2e
      mil: 2
      text: Alarms and alerts are configured and maintained to support the identification of cybersecurity
        events
    - id: SITUATION-2f
      mil: 2
      text: Monitoring activities are aligned with the threat profile (THREAT-2e)
    - id: SITUATION-2g
      mil: 3
      text: More rigorous monitoring is performed for higher priority assets
    - id: SITUATION-2h
      mil: 3
      text: Risk analysis information (RISK-3d) is used to identify indicators of anomalous activity
    - id: SITUATION-2i
      mil: 3
      text: Indicators of anomalous activity are evaluated and updated periodically and according to defined
        triggers, such as system changes and external events
  - number: 3
    title: Establish and Maintain Situational Awareness
    practices:
    - id: SITUATION-3a
      mil: 2
      text: Methods of communicating the current state of cybersecurity for the function are established
        and maintained
    - id: SITUATION-3b
      mil: 2
      text: Monitoring data are aggregated to provide an understanding of the operational state of the
        function
    - id: SITUATION-3c
      mil: 2
      text: Relevant information from across the organization is available to enhance situational awareness
    - id: SITUATION-3d
      mil: 3
      text: Situational awareness reporting requirements have been defined and address timely dissemination
        of cybersecurity information to organization-defined stakeholders
    - id: SITUATION-3e
      mil: 3
      text: Relevant information from outside the organization is collected and made available across
        the organization to enhance situational awareness
    - id: SITUATION-3f
      mil: 3
      text: A capability is established and maintained to aggregate, correlate, and analyze the outputs
        of cybersecurity monitoring activities and provide a near-real-time understanding of the cybersecurity
        state of the function
    - id: SITUATION-3g
      mil: 3
      text: Predefined states of operation are documented and can be implemented based on the cybersecurity
        state of the function or when triggered by activities in other domains
  - number: 4
    title: Management Activities for the SITUATION domain
    practices:
    - id: SITUATION-4a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the SITUATION
        domain
    - id: SITUATION-4b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        SITUATION domain
    - id: SITUATION-4c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the SITUATION domain
    - id: SITUATION-4d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the SITUATION
        domain are assigned to personnel
    - id: SITUATION-4e
      mil: 3
      text: Personnel performing activities in the SITUATION domain have the skills and knowledge needed
        to perform their assigned responsibilities
    - id: SITUATION-4f
      mil: 3
      text: The effectiveness of activities in the SITUATION domain is evaluated and tracked
- short_code: RESPONSE
  full_name: Event and Incident Response, Continuity of Operations
  purpose: Establish and maintain plans, procedures, and technologies to detect, analyze, mitigate, respond
    to, and recover from cybersecurity events and incidents and to sustain operations during cybersecurity
    incidents, commensurate with the risk to critical infrastructure and organizational objectives.
  practices_populated: true
  objectives:
  - number: 1
    title: Detect Cybersecurity Events
    practices:
    - id: RESPONSE-1a
      mil: 1
      text: Detected cybersecurity events are reported to a specified person or role and documented, at
        least in an ad hoc manner
    - id: RESPONSE-1b
      mil: 2
      text: Criteria are established for cybersecurity event detection (for example, what constitutes
        a cybersecurity event, where to look for cybersecurity events)
    - id: RESPONSE-1c
      mil: 2
      text: Cybersecurity events are documented based on the established criteria
    - id: RESPONSE-1d
      mil: 3
      text: Event information is correlated to support incident analysis by identifying patterns, trends,
        and other common features
    - id: RESPONSE-1e
      mil: 3
      text: Cybersecurity event detection activities are adjusted based on identified risks and the organization's
        threat profile (THREAT-2e)
    - id: RESPONSE-1f
      mil: 3
      text: Situational awareness for the function is monitored to support the identification of cybersecurity
        events
  - number: 2
    title: Analyze Cybersecurity Events and Declare Incidents
    practices:
    - id: RESPONSE-2a
      mil: 1
      text: Criteria for declaring cybersecurity incidents are established, at least in an ad hoc manner
    - id: RESPONSE-2b
      mil: 1
      text: Cybersecurity events are analyzed to support the declaration of cybersecurity incidents, at
        least in an ad hoc manner
    - id: RESPONSE-2c
      mil: 2
      text: Cybersecurity incident declaration criteria are formally established based on potential impact
        to the function
    - id: RESPONSE-2d
      mil: 2
      text: Cybersecurity events are declared to be incidents based on established criteria
    - id: RESPONSE-2e
      mil: 2
      text: Cybersecurity incident declaration criteria are updated periodically and according to defined
        triggers, such as organizational changes, lessons learned from plan execution, or newly identified
        threats
    - id: RESPONSE-2f
      mil: 2
      text: There is a repository where cybersecurity events and incidents are documented and tracked
        to closure
    - id: RESPONSE-2g
      mil: 2
      text: Internal and external stakeholders (for example, executives, attorneys, government agencies,
        connected organizations, vendors, sector organizations, regulators) are identified and notified
        of incidents based on situational awareness reporting requirements (SITUATION-3d)
    - id: RESPONSE-2h
      mil: 3
      text: Criteria for cybersecurity incident declaration are aligned with cyber risk prioritization
        criteria (RISK-3b)
    - id: RESPONSE-2i
      mil: 3
      text: Cybersecurity incidents are correlated to identify patterns, trends, and other common features
        across multiple incidents
  - number: 3
    title: Respond to Cybersecurity Incidents
    practices:
    - id: RESPONSE-3a
      mil: 1
      text: Cybersecurity incident response personnel are identified, and roles are assigned, at least
        in an ad hoc manner
    - id: RESPONSE-3b
      mil: 1
      text: Responses to cybersecurity incidents are executed, at least in an ad hoc manner, to limit
        impact to the function and restore normal operations
    - id: RESPONSE-3c
      mil: 1
      text: Reporting of incidents is performed (for example, internal reporting, ICS-CERT, relevant ISACs),
        at least in an ad hoc manner
    - id: RESPONSE-3d
      mil: 2
      text: Cybersecurity incident response plans that address all phases of the incident lifecycle are
        established and maintained
    - id: RESPONSE-3e
      mil: 2
      text: Cybersecurity incident response is executed according to defined plans and procedures
    - id: RESPONSE-3f
      mil: 2
      text: Cybersecurity incident response plans include a communications plan for internal and external
        stakeholders
    - id: RESPONSE-3g
      mil: 2
      text: Cybersecurity incident response plan exercises are conducted periodically and according to
        defined triggers, such as system changes and external events
    - id: RESPONSE-3h
      mil: 2
      text: Cybersecurity incident lessons-learned activities are performed and corrective actions are
        taken, including updates to the incident response plan
    - id: RESPONSE-3i
      mil: 3
      text: Cybersecurity incident root-cause analysis is performed and corrective actions are taken,
        including updates to the incident response plan
    - id: RESPONSE-3j
      mil: 3
      text: Cybersecurity incident responses are coordinated with vendors, law enforcement, and other
        external entities as appropriate, including support for evidence collection and preservation
    - id: RESPONSE-3k
      mil: 3
      text: Cybersecurity incident response personnel participate in joint cybersecurity exercises with
        other organizations
    - id: RESPONSE-3l
      mil: 3
      text: Cybersecurity incident responses leverage and trigger predefined states of operation (SITUATION-3g)
  - number: 4
    title: Address Cybersecurity in Continuity of Operations
    practices:
    - id: RESPONSE-4a
      mil: 1
      text: Continuity plans are developed to sustain and restore operation of the function if a cybersecurity
        event or incident occurs, at least in an ad hoc manner
    - id: RESPONSE-4b
      mil: 1
      text: Data backups are available and tested, at least in an ad hoc manner
    - id: RESPONSE-4c
      mil: 1
      text: IT and OT assets requiring spares are identified, at least in an ad hoc manner
    - id: RESPONSE-4d
      mil: 2
      text: Continuity plans address potential impacts from cybersecurity incidents
    - id: RESPONSE-4e
      mil: 2
      text: The assets and activities necessary to sustain minimum operations of the function are identified
        and documented in continuity plans
    - id: RESPONSE-4f
      mil: 2
      text: Continuity plans address IT, OT, and information assets that are important to the delivery
        of the function, including the availability of backup data and replacement, redundant, and spare
        IT and OT assets
    - id: RESPONSE-4g
      mil: 2
      text: Recovery time objectives (RTOs) and recovery point objectives (RPOs) for assets that are important
        to the delivery of the function are incorporated into continuity plans
    - id: RESPONSE-4h
      mil: 2
      text: Cybersecurity incident criteria that trigger the execution of continuity plans are established
        and communicated to incident response and continuity management personnel
    - id: RESPONSE-4i
      mil: 2
      text: Continuity plans are tested through evaluations and exercises periodically and according to
        defined triggers, such as system changes and external events
    - id: RESPONSE-4j
      mil: 2
      text: Cybersecurity controls protecting backup data are equivalent to or more rigorous than controls
        protecting source data
    - id: RESPONSE-4k
      mil: 2
      text: Data backups are logically or physically separated from source data
    - id: RESPONSE-4l
      mil: 2
      text: Spares for selected IT and OT assets are available
    - id: RESPONSE-4m
      mil: 3
      text: Continuity plans are aligned with identified risks and the organization's threat profile (THREAT-2e)
        to ensure coverage of identified risk categories and threats
    - id: RESPONSE-4n
      mil: 3
      text: Continuity plan exercises address higher priority risks
    - id: RESPONSE-4o
      mil: 3
      text: The results of continuity plan testing or activation are compared to recovery objectives,
        and plans are improved accordingly
    - id: RESPONSE-4p
      mil: 3
      text: Continuity plans are periodically reviewed and updated
  - number: 5
    title: Management Activities for the RESPONSE domain
    practices:
    - id: RESPONSE-5a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the RESPONSE
        domain
    - id: RESPONSE-5b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        RESPONSE domain
    - id: RESPONSE-5c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the RESPONSE domain
    - id: RESPONSE-5d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the RESPONSE
        domain are assigned to personnel
    - id: RESPONSE-5e
      mil: 3
      text: Personnel performing activities in the RESPONSE domain have the skills and knowledge needed
        to perform their assigned responsibilities
    - id: RESPONSE-5f
      mil: 3
      text: The effectiveness of activities in the RESPONSE domain is evaluated and tracked
- short_code: THIRD-PARTIES
  full_name: Third-Party Risk Management
  purpose: Establish and maintain controls to manage the cyber risks arising from suppliers and other
    third parties, commensurate with the risk to critical infrastructure and organizational objectives.
  practices_populated: true
  objectives:
  - number: 1
    title: Identify and Prioritize Third Parties
    practices:
    - id: THIRD-PARTIES-1a
      mil: 1
      text: Important IT and OT third-party dependencies are identified (that is, internal and external
        parties on which the delivery of the function depends, including operating partners), at least
        in an ad hoc manner
    - id: THIRD-PARTIES-1b
      mil: 1
      text: Third parties that have access to, control of, or custody of any IT, OT, or information assets
        that are important to the delivery of the function are identified, at least in an ad hoc manner
    - id: THIRD-PARTIES-1c
      mil: 2
      text: A defined method is followed to identify risks arising from suppliers and other third parties
    - id: THIRD-PARTIES-1d
      mil: 2
      text: Third parties are prioritized according to established criteria (for example, importance to
        the delivery of the function, impact of a compromise or disruption, ability to negotiate cybersecurity
        requirements within contracts)
    - id: THIRD-PARTIES-1e
      mil: 2
      text: Escalated prioritization is assigned to suppliers and other third parties whose compromise
        or disruption could cause significant consequences (for example, single-source suppliers, suppliers
        with privileged access)
    - id: THIRD-PARTIES-1f
      mil: 3
      text: Prioritization of suppliers and other third parties is updated periodically and according
        to defined triggers, such as system changes and external events
  - number: 2
    title: Manage Third-Party Risk
    practices:
    - id: THIRD-PARTIES-2a
      mil: 1
      text: The selection of suppliers and other third parties includes consideration of their cybersecurity
        qualifications, at least in an ad hoc manner
    - id: THIRD-PARTIES-2b
      mil: 1
      text: The selection of products and services includes consideration of their cybersecurity capabilities,
        at least in an ad hoc manner
    - id: THIRD-PARTIES-2c
      mil: 2
      text: A defined method is followed to identify cybersecurity requirements and implement associated
        controls that protect against the risks arising from suppliers and other third parties
    - id: THIRD-PARTIES-2d
      mil: 2
      text: A defined method is followed to evaluate and select suppliers and other third parties
    - id: THIRD-PARTIES-2e
      mil: 2
      text: More rigorous cybersecurity controls are implemented for higher priority suppliers and other
        third parties
    - id: THIRD-PARTIES-2f
      mil: 2
      text: Cybersecurity requirements (for example, vulnerability notification, incident-related SLA
        requirements) are formalized in agreements with suppliers and other third parties
    - id: THIRD-PARTIES-2g
      mil: 2
      text: Suppliers and other third parties periodically attest to their ability to meet cybersecurity
        requirements
    - id: THIRD-PARTIES-2h
      mil: 3
      text: Cybersecurity requirements for suppliers and other third parties include secure software and
        secure product development requirements where appropriate
    - id: THIRD-PARTIES-2i
      mil: 3
      text: Selection criteria for products include consideration of end-of-life and end-of-support timelines
    - id: THIRD-PARTIES-2j
      mil: 3
      text: Selection criteria include consideration of safeguards against counterfeit or compromised
        software, hardware, and services
    - id: THIRD-PARTIES-2k
      mil: 3
      text: Selection criteria for higher priority assets include evaluation of bills of material for
        key asset elements, such as hardware and software
    - id: THIRD-PARTIES-2l
      mil: 3
      text: Selection criteria for higher priority assets include evaluation of any associated third-party
        hosting environments and source data
    - id: THIRD-PARTIES-2m
      mil: 3
      text: Acceptance testing of procured assets includes consideration of cybersecurity requirements
  - number: 3
    title: Management Activities for the THIRD-PARTIES domain
    practices:
    - id: THIRD-PARTIES-3a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the THIRD-PARTIES
        domain
    - id: THIRD-PARTIES-3b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        THIRD-PARTIES domain
    - id: THIRD-PARTIES-3c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the THIRD-PARTIES domain
    - id: THIRD-PARTIES-3d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the THIRD-PARTIES
        domain are assigned to personnel
    - id: THIRD-PARTIES-3e
      mil: 3
      text: Personnel performing activities in the THIRD-PARTIES domain have the skills and knowledge
        needed to perform their assigned responsibilities
    - id: THIRD-PARTIES-3f
      mil: 3
      text: The effectiveness of activities in the THIRD-PARTIES domain is evaluated and tracked
- short_code: WORKFORCE
  full_name: Workforce Management
  purpose: Establish and maintain plans, procedures, technologies, and controls to create a culture of
    cybersecurity and to ensure the ongoing suitability and competence of personnel, commensurate with
    the risk to critical infrastructure and organizational objectives.
  practices_populated: true
  objectives:
  - number: 1
    title: Implement Workforce Controls
    practices:
    - id: WORKFORCE-1a
      mil: 1
      text: Personnel vetting (for example, background checks, drug tests) is performed at hire, at least
        in an ad hoc manner
    - id: WORKFORCE-1b
      mil: 1
      text: Personnel separation procedures address cybersecurity, at least in an ad hoc manner
    - id: WORKFORCE-1c
      mil: 2
      text: Personnel vetting is performed at hire and periodically for positions that have access to
        assets that are important to the delivery of the function
    - id: WORKFORCE-1d
      mil: 2
      text: Personnel separation and transfer procedures address cybersecurity, including supplementary
        vetting as appropriate
    - id: WORKFORCE-1e
      mil: 2
      text: Personnel are made aware of their responsibilities for protection and acceptable use of IT,
        OT, and information assets
    - id: WORKFORCE-1f
      mil: 3
      text: Vetting is performed for all positions (including employees, vendors, and contractors) at
        a level commensurate with position risk
    - id: WORKFORCE-1g
      mil: 3
      text: A formal accountability process that includes disciplinary actions is implemented for personnel
        who fail to comply with established security policies and procedures
  - number: 2
    title: Increase Cybersecurity Awareness
    practices:
    - id: WORKFORCE-2a
      mil: 1
      text: Cybersecurity awareness activities occur, at least in an ad hoc manner
    - id: WORKFORCE-2b
      mil: 2
      text: Cybersecurity awareness objectives are established and maintained
    - id: WORKFORCE-2c
      mil: 2
      text: Cybersecurity awareness objectives are aligned with the defined threat profile (THREAT-2e)
    - id: WORKFORCE-2d
      mil: 2
      text: Cybersecurity awareness activities are conducted periodically
    - id: WORKFORCE-2e
      mil: 3
      text: Cybersecurity awareness activities are tailored to job role
    - id: WORKFORCE-2f
      mil: 3
      text: Cybersecurity awareness activities address predefined states of operation (SITUATION-3g)
    - id: WORKFORCE-2g
      mil: 3
      text: The effectiveness of cybersecurity awareness activities is evaluated periodically and according
        to defined triggers, such as system changes and external events, and improvements are made as
        appropriate
  - number: 3
    title: Assign Cybersecurity Responsibilities
    practices:
    - id: WORKFORCE-3a
      mil: 1
      text: Cybersecurity responsibilities for the function are identified, at least in an ad hoc manner
    - id: WORKFORCE-3b
      mil: 1
      text: Cybersecurity responsibilities are assigned to specific people, at least in an ad hoc manner
    - id: WORKFORCE-3c
      mil: 2
      text: Cybersecurity responsibilities are assigned to specific roles, including external service
        providers
    - id: WORKFORCE-3d
      mil: 2
      text: Cybersecurity responsibilities are documented
    - id: WORKFORCE-3e
      mil: 3
      text: Cybersecurity responsibilities and job requirements are reviewed and updated periodically
        and according to defined triggers, such as system changes and changes to organizational structure
    - id: WORKFORCE-3f
      mil: 3
      text: Assigned cybersecurity responsibilities are managed to ensure adequacy and redundancy of coverage,
        including succession planning
  - number: 4
    title: Develop Cybersecurity Workforce
    practices:
    - id: WORKFORCE-4a
      mil: 1
      text: Cybersecurity training is made available to personnel with assigned cybersecurity responsibilities,
        at least in an ad hoc manner
    - id: WORKFORCE-4b
      mil: 1
      text: Cybersecurity knowledge, skill, and ability requirements and gaps are identified for both
        current and future operational needs, at least in an ad hoc manner
    - id: WORKFORCE-4c
      mil: 2
      text: Identified cybersecurity knowledge, skill, and ability gaps are addressed through training,
        recruiting, and retention efforts
    - id: WORKFORCE-4d
      mil: 2
      text: Cybersecurity training is provided as a prerequisite to granting access to assets that are
        important to the delivery of the function
    - id: WORKFORCE-4e
      mil: 3
      text: The effectiveness of training programs is evaluated periodically, and improvements are made
        as appropriate
    - id: WORKFORCE-4f
      mil: 3
      text: Training programs include continuing education and professional development opportunities
        for personnel with significant cybersecurity responsibilities
  - number: 5
    title: Management Activities for the WORKFORCE domain
    practices:
    - id: WORKFORCE-5a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the WORKFORCE
        domain
    - id: WORKFORCE-5b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        WORKFORCE domain
    - id: WORKFORCE-5c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the WORKFORCE domain
    - id: WORKFORCE-5d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the WORKFORCE
        domain are assigned to personnel
    - id: WORKFORCE-5e
      mil: 3
      text: Personnel performing activities in the WORKFORCE domain have the skills and knowledge needed
        to perform their assigned responsibilities
    - id: WORKFORCE-5f
      mil: 3
      text: The effectiveness of activities in the WORKFORCE domain is evaluated and tracked
- short_code: ARCHITECTURE
  full_name: Cybersecurity Architecture
  purpose: Establish and maintain the structure and behavior of the organization's cybersecurity architecture,
    including controls, processes, technologies, and other elements, commensurate with the risk to critical
    infrastructure and organizational objectives.
  practices_populated: true
  objectives:
  - number: 1
    title: Establish and Maintain Cybersecurity Architecture Strategy and Program
    practices:
    - id: ARCHITECTURE-1a
      mil: 1
      text: The organization has a strategy for cybersecurity architecture, which may be developed and
        managed in an ad hoc manner
    - id: ARCHITECTURE-1b
      mil: 2
      text: A strategy for cybersecurity architecture is established and maintained in alignment with
        the organization's cybersecurity program strategy (PROGRAM-1b) and enterprise architecture
    - id: ARCHITECTURE-1c
      mil: 2
      text: A documented cybersecurity architecture is established and maintained that includes IT and
        OT systems and networks and aligns with system and asset categorization and prioritization
    - id: ARCHITECTURE-1d
      mil: 2
      text: Governance for cybersecurity architecture (such as an architecture review process) is established
        and maintained that includes provisions for periodic architectural reviews and an exceptions process
    - id: ARCHITECTURE-1e
      mil: 2
      text: Senior management sponsorship for the cybersecurity architecture program is visible and active
    - id: ARCHITECTURE-1f
      mil: 2
      text: The cybersecurity architecture establishes and maintains cybersecurity requirements for the
        organization's assets
    - id: ARCHITECTURE-1g
      mil: 2
      text: Cybersecurity controls are selected and implemented to meet cybersecurity requirements
    - id: ARCHITECTURE-1h
      mil: 3
      text: The cybersecurity architecture strategy and program are aligned with the organization's enterprise
        architecture strategy and program
    - id: ARCHITECTURE-1i
      mil: 3
      text: Conformance of the organization's systems and networks to the cybersecurity architecture is
        evaluated periodically and according to defined triggers, such as system changes and external
        events
    - id: ARCHITECTURE-1j
      mil: 3
      text: The cybersecurity architecture is guided by the organization's risk analysis information (RISK-3d)
        and threat profile (THREAT-2e)
    - id: ARCHITECTURE-1k
      mil: 3
      text: The cybersecurity architecture addresses predefined states of operation (SITUATION-3g)
  - number: 2
    title: Implement Network Protections as an Element of the Cybersecurity Architecture
    practices:
    - id: ARCHITECTURE-2a
      mil: 1
      text: Network protections are implemented, at least in an ad hoc manner
    - id: ARCHITECTURE-2b
      mil: 1
      text: The organization's IT systems are separated from OT systems through segmentation, either through
        physical means or logical means, at least in an ad hoc manner
    - id: ARCHITECTURE-2c
      mil: 2
      text: Network protections are defined and enforced for selected asset types according to asset risk
        and priority (for example, internal assets, perimeter assets, assets connected to the organization's
        Wi-Fi, cloud assets, remote access, and externally owned devices)
    - id: ARCHITECTURE-2d
      mil: 2
      text: Assets that are important to the delivery of the function are logically or physically segmented
        into distinct security zones based on asset cybersecurity requirements
    - id: ARCHITECTURE-2e
      mil: 2
      text: Network protections incorporate the principles of least privilege and least functionality
    - id: ARCHITECTURE-2f
      mil: 2
      text: Network protections include monitoring, analysis, and control of network traffic for selected
        security zones (for example, firewalls, allowlisting, intrusion detection and prevention systems
        (IDPS))
    - id: ARCHITECTURE-2g
      mil: 2
      text: Web traffic and email are monitored, analyzed, and controlled (for example, malicious link
        blocking, suspicious download blocking, email authentication techniques, IP address blocking)
    - id: ARCHITECTURE-2h
      mil: 3
      text: All assets are segmented into distinct security zones based on cybersecurity requirements
    - id: ARCHITECTURE-2i
      mil: 3
      text: Separate networks are implemented, where warranted, that logically or physically segment assets
        into security zones with independent authentication
    - id: ARCHITECTURE-2j
      mil: 3
      text: OT systems are operationally independent from IT systems so that OT operations can be sustained
        during an outage of IT systems
    - id: ARCHITECTURE-2k
      mil: 3
      text: Device connections to the network are controlled to ensure that only authorized devices can
        connect (for example, network access control (NAC))
    - id: ARCHITECTURE-2l
      mil: 3
      text: The cybersecurity architecture enables the isolation of compromised assets
  - number: 3
    title: Implement IT and OT Asset Security as an Element of the Cybersecurity Architecture
    practices:
    - id: ARCHITECTURE-3a
      mil: 1
      text: Logical and physical access controls are implemented to protect assets that are important
        to the delivery of the function, where feasible, at least in an ad hoc manner
    - id: ARCHITECTURE-3b
      mil: 1
      text: Endpoint protections (such as secure configuration, security applications, and host monitoring)
        are implemented to protect assets that are important to the delivery of the function, where feasible,
        at least in an ad hoc manner
    - id: ARCHITECTURE-3c
      mil: 2
      text: The principle of least privilege (for example, limiting administrative access for users and
        service accounts) is enforced
    - id: ARCHITECTURE-3d
      mil: 2
      text: The principle of least functionality (for example, limiting services, limiting applications,
        limiting ports, limiting connected devices) is enforced
    - id: ARCHITECTURE-3e
      mil: 2
      text: Secure configurations are established and maintained as part of the asset deployment process
        where feasible
    - id: ARCHITECTURE-3f
      mil: 2
      text: Security applications are required as an element of device configuration where feasible (for
        example, endpoint detection and response, host-based firewalls)
    - id: ARCHITECTURE-3g
      mil: 2
      text: The use of removeable media is controlled (for example, limiting the use of USB devices, managing
        external hard drives)
    - id: ARCHITECTURE-3h
      mil: 2
      text: Cybersecurity controls are implemented for all assets within the function either at the asset
        level or as compensating controls where asset-level controls are not feasible
    - id: ARCHITECTURE-3i
      mil: 2
      text: Maintenance and capacity management activities are performed for all assets within the function
    - id: ARCHITECTURE-3j
      mil: 2
      text: The physical operating environment is controlled to protect the operation of assets within
        the function
    - id: ARCHITECTURE-3k
      mil: 2
      text: More rigorous cybersecurity controls are implemented for higher priority assets
    - id: ARCHITECTURE-3l
      mil: 3
      text: Configuration of and changes to firmware are controlled throughout the asset lifecycle
    - id: ARCHITECTURE-3m
      mil: 3
      text: Controls (such as allowlists, blocklists, and configuration settings) are implemented to prevent
        the execution of unauthorized code
  - number: 4
    title: Implement Software Security as an Element of the Cybersecurity Architecture
    practices:
    - id: ARCHITECTURE-4a
      mil: 2
      text: Software developed in-house for deployment on higher priority assets is developed using secure
        software development practices
    - id: ARCHITECTURE-4b
      mil: 2
      text: The selection of procured software for deployment on higher priority assets includes consideration
        of the vendor's secure software development practices
    - id: ARCHITECTURE-4c
      mil: 2
      text: Secure software configurations are required as part of the software deployment process for
        both procured software and software developed in-house
    - id: ARCHITECTURE-4d
      mil: 3
      text: All software developed in-house is developed using secure software development practices
    - id: ARCHITECTURE-4e
      mil: 3
      text: The selection of all procured software includes consideration of the vendor's secure software
        development practices
    - id: ARCHITECTURE-4f
      mil: 3
      text: The architecture review process evaluates the security of new and revised applications prior
        to deployment
    - id: ARCHITECTURE-4g
      mil: 3
      text: The authenticity of all software and firmware is validated prior to deployment
    - id: ARCHITECTURE-4h
      mil: 3
      text: Security testing (for example, static testing, dynamic testing, fuzz testing, penetration
        testing) is performed for in-house-developed and in-house-tailored applications periodically and
        according to defined triggers, such as system changes and external events
  - number: 5
    title: Implement Data Security as an Element of the Cybersecurity Architecture
    practices:
    - id: ARCHITECTURE-5a
      mil: 1
      text: Sensitive data is protected at rest, at least in an ad hoc manner
    - id: ARCHITECTURE-5b
      mil: 2
      text: All data at rest is protected for selected data categories
    - id: ARCHITECTURE-5c
      mil: 2
      text: All data in transit is protected for selected data categories
    - id: ARCHITECTURE-5d
      mil: 2
      text: Cryptographic controls are implemented for data at rest and data in transit for selected data
        categories
    - id: ARCHITECTURE-5e
      mil: 2
      text: Key management infrastructure (that is, key generation, key storage, key destruction, key
        update, and key revocation) is implemented to support cryptographic controls
    - id: ARCHITECTURE-5f
      mil: 2
      text: Controls to restrict the exfiltration of data (for example, data loss prevention tools) are
        implemented
    - id: ARCHITECTURE-5g
      mil: 3
      text: The cybersecurity architecture includes protections (such as full disk encryption) for data
        that is stored on assets that may be lost or stolen
    - id: ARCHITECTURE-5h
      mil: 3
      text: The cybersecurity architecture includes protections against unauthorized changes to software,
        firmware, and data
  - number: 6
    title: Management Activities for the ARCHITECTURE domain
    practices:
    - id: ARCHITECTURE-6a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the ARCHITECTURE
        domain
    - id: ARCHITECTURE-6b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        ARCHITECTURE domain
    - id: ARCHITECTURE-6c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the ARCHITECTURE domain
    - id: ARCHITECTURE-6d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the ARCHITECTURE
        domain are assigned to personnel
    - id: ARCHITECTURE-6e
      mil: 3
      text: Personnel performing activities in the ARCHITECTURE domain have the skills and knowledge needed
        to perform their assigned responsibilities
    - id: ARCHITECTURE-6f
      mil: 3
      text: The effectiveness of activities in the ARCHITECTURE domain is evaluated and tracked
- short_code: PROGRAM
  full_name: Cybersecurity Program Management
  purpose: Establish and maintain an enterprise cybersecurity program that provides governance, strategic
    planning, and sponsorship for the organization's cybersecurity activities in a manner that aligns
    cybersecurity objectives with both the organization's strategic objectives and the risk to critical
    infrastructure.
  practices_populated: true
  objectives:
  - number: 1
    title: Establish Cybersecurity Program Strategy
    practices:
    - id: PROGRAM-1a
      mil: 1
      text: The organization has a cybersecurity program strategy, which may be developed and managed
        in an ad hoc manner
    - id: PROGRAM-1b
      mil: 2
      text: The cybersecurity program strategy defines goals and objectives for the organization's cybersecurity
        activities
    - id: PROGRAM-1c
      mil: 2
      text: The cybersecurity program strategy and priorities are documented and aligned with the organization's
        mission, strategic objectives, and risk to critical infrastructure
    - id: PROGRAM-1d
      mil: 2
      text: The cybersecurity program strategy defines the organization's approach to provide program
        oversight and governance for cybersecurity activities
    - id: PROGRAM-1e
      mil: 2
      text: The cybersecurity program strategy defines the structure and organization of the cybersecurity
        program
    - id: PROGRAM-1f
      mil: 2
      text: The cybersecurity program strategy identifies standards and guidelines intended to be followed
        by the program
    - id: PROGRAM-1g
      mil: 2
      text: The cybersecurity program strategy identifies any applicable compliance requirements that
        must be satisfied by the program (for example, NERC CIP, TSA Pipeline Security Guidelines, PCI
        DSS, ISO, DoD CMMC)
    - id: PROGRAM-1h
      mil: 3
      text: The cybersecurity program strategy is updated periodically and according to defined triggers,
        such as business changes, changes in the operating environment, and changes in the threat profile
        (THREAT-2e)
  - number: 2
    title: Establish and Maintain Cybersecurity Program
    practices:
    - id: PROGRAM-2a
      mil: 1
      text: Senior management with proper authority provides support for the cybersecurity program, at
        least in an ad hoc manner
    - id: PROGRAM-2b
      mil: 2
      text: The cybersecurity program is established according to the cybersecurity program strategy
    - id: PROGRAM-2c
      mil: 2
      text: Senior management sponsorship for the cybersecurity program is visible and active
    - id: PROGRAM-2d
      mil: 2
      text: Senior management sponsorship is provided for the development, maintenance, and enforcement
        of cybersecurity policies
    - id: PROGRAM-2e
      mil: 2
      text: Responsibility for the cybersecurity program is assigned to a role with sufficient authority
    - id: PROGRAM-2f
      mil: 2
      text: Stakeholders for cybersecurity program management activities are identified and involved
    - id: PROGRAM-2g
      mil: 3
      text: Cybersecurity program activities are periodically reviewed to ensure that they align with
        the cybersecurity program strategy
    - id: PROGRAM-2h
      mil: 3
      text: Cybersecurity activities are independently reviewed to ensure conformance with cybersecurity
        policies and procedures, periodically and according to defined triggers, such as process changes
    - id: PROGRAM-2i
      mil: 3
      text: The cybersecurity program addresses and enables the achievement of legal and regulatory compliance,
        as appropriate
    - id: PROGRAM-2j
      mil: 3
      text: The organization collaborates with external entities to contribute to the development and
        implementation of cybersecurity standards, guidelines, leading practices, lessons learned, and
        emerging technologies
  - number: 3
    title: Management Activities for the PROGRAM domain
    practices:
    - id: PROGRAM-3a
      mil: 2
      text: Documented procedures are established, followed, and maintained for activities in the PROGRAM
        domain
    - id: PROGRAM-3b
      mil: 2
      text: Adequate resources (people, funding, and tools) are provided to support activities in the
        PROGRAM domain
    - id: PROGRAM-3c
      mil: 3
      text: Up-to-date policies or other organizational directives define requirements for activities
        in the PROGRAM domain
    - id: PROGRAM-3d
      mil: 3
      text: Responsibility, accountability, and authority for the performance of activities in the PROGRAM
        domain are assigned to personnel
    - id: PROGRAM-3e
      mil: 3
      text: Personnel performing activities in the PROGRAM domain have the skills and knowledge needed
        to perform their assigned responsibilities
    - id: PROGRAM-3f
      mil: 3
      text: The effectiveness of activities in the PROGRAM domain is evaluated and tracked
