# --- NERC CIP <-> PCI DSS (ADR-0027, Sprint 14) ---
# METHODOLOGICALLY WEAKER than the C2M2/NIST/CIS pairings above, the same
# way the ISO 27001 and SOC 2 pairings are: PCI DSS's side of every entry
# below is the short official SECTION-level statement only (e.g. "9.2
# Physical access controls manage entry into facilities and systems
# containing cardholder data."), not the much more detailed leaf-level
# "Defined Approach Requirement" text or its accompanying Testing
# Procedures/Purpose/Good Practice guidance - PCI DSS v4.0.1 is
# copyrighted, all-rights-reserved content with no reproduction rights
# granted (see generate_pci_dss_yaml.py's module docstring and ADR-0027),
# even though the document itself is freely downloadable at no cost.
# These entries are therefore a Section-level topical judgment, not the
# full-text semantic comparison the C2M2/NIST/CIS pairings use. Treat
# these entries with correspondingly more caution, the same as the ISO
# 27001 and SOC 2 pairings.
#
# 80 of 141 NERC CIP practices have a reviewed PCI DSS equivalent below -
# a higher hit rate than either the ISO 27001 pairing (95/141, but scored
# from full Annex A theme coverage) or the SOC 2 pairing (60/141), and
# comparable to the CIS Controls pairing (84/141), because PCI DSS's 12
# Requirements collectively cover a very similar breadth of technical
# security control ground to CIS Controls (network security, secure
# configuration, cryptography, malware defense, vulnerability management,
# access control, physical security, logging, and testing), even at the
# Section-statement level alone.
#
# The remaining 61 were reviewed and NOT included for these reasons:
# - CIP-002's impact-categorization concept and CIP-003's CIP-Senior-
#   Manager/delegation concepts have no PCI DSS analogue (the same gap
#   found in every other pairing).
# - CIP-009 (Recovery Plans) and most of CIP-012 (Control Center
#   communication availability) have almost no PCI DSS match - PCI DSS
#   has no dedicated business-continuity/disaster-recovery Section
#   analogous to SOC 2's A1.1-A1.3 or CIS Controls' Control 11, since
#   PCI DSS's scope is protecting cardholder data via security controls,
#   not business continuity. Only one CIP-009 part (1.5, data
#   preservation for incident-cause determination) found a real, if
#   modest, match via PCI's 10.2 forensic-analysis criterion.
# - Several NERC parts naming specific technical mechanisms that PCI DSS
#   only names at the finer Defined-Approach-Requirement level (out of
#   scope here) have no Section-level match: default-account inventory/
#   password-changing (CIP-007-5.2/5.4 - PCI's equivalent concept lives
#   inside Section 2.2's leaf-level 2.2.2, not in the 2.2 Section
#   statement itself) and password-rotation cadence (CIP-007-5.6 - the
#   same genuine gap already found for CIS Controls/SOC 2, since none of
#   these frameworks' verified text mandates forced periodic rotation).
# - CIP-014 (physical Transmission station risk assessment) has ZERO
#   matches in this pairing - an even sharper gap than either the CIS
#   Controls or SOC 2 pairings found (both located at least one weak
#   match), because PCI DSS's Section-level statements name no analogue
#   for physical/civil-engineering risk assessment, unaffiliated-verifier
#   selection criteria, or law-enforcement-contact-information concepts
#   at this level of granularity.
#
# As with every other pairing, several NERC CIP parts share the same PCI
# DSS Section as another part of the same standard (e.g. CIP-006's
# physical-access-control parts 1.1-1.10 mostly point to Section 9.2 or
# 9.3, and CIP-013's supply-chain parts all point to Section 12.8) -
# this reflects PCI DSS being genuinely coarser-grained than NERC CIP at
# the Section level (by this transcription's own deliberate scope
# choice, ADR-0027), not a duplication error.

