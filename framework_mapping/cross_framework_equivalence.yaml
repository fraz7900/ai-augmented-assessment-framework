# --- NERC CIP <-> SOC 2 (ADR-0026, Sprint 13) ---
# METHODOLOGICALLY WEAKER than the C2M2/NIST/CIS pairings above, the same
# way the ISO 27001 pairing is: SOC 2's side of every entry below is the
# short official criterion STATEMENT only (e.g. "The entity implements
# controls to prevent or detect and act upon the introduction of
# unauthorized or malicious software..."), not the much longer "points of
# focus" elaboration - AICPA's Trust Services Criteria is copyrighted,
# all-rights-reserved content with no reproduction rights granted (see
# generate_soc2_yaml.py's module docstring and ADR-0026), even though the
# document itself is freely downloadable at no cost. These entries are
# therefore a statement-level topical judgment, not the full-text semantic
# comparison the C2M2/NIST/CIS pairings use. Treat these entries with
# correspondingly more caution, the same as the ISO 27001 pairing.
#
# 60 of 141 NERC CIP practices have a reviewed SOC 2 equivalent below -
# a lower hit rate than both the ISO 27001 pairing (95/141) and the CIS
# Controls pairing (84/141), because several concepts NERC CIP requires
# in explicit procedural detail have no equally explicit SOC 2 criterion
# STATEMENT (as opposed to being buried in points of focus, which are out
# of scope here): personnel background-check/screening (CIP-004's Personnel
# Risk Assessment parts - SOC 2's points of focus mention background
# checks under CC1.4, but the criterion statement itself does not),
# patch management (CIP-007's patch-tracking parts - SOC 2's points of
# focus under CC7.1 mention vulnerability scanning, but again not the
# criterion statement), password composition/rotation (CIP-007-5.5/5.6 -
# no SOC 2 criterion statement addresses password length, complexity, or
# rotation cadence at all), and audit-log-retention specifics (CIP-006/
# CIP-007/CIP-008's 90-day log-retention parts - SOC 2's Common Criteria
# has no general log-retention criterion statement analogous to CIS
# Controls' 8.10; the closest SOC 2 criteria, P6.2/P6.3, are Privacy-
# category record-keeping requirements scoped specifically to personal
# information disclosures, not general security event logs, so they were
# deliberately NOT used here to avoid misapplying a privacy-scoped
# criterion outside its real scope).
#
# The remaining 81 were reviewed and NOT included for these reasons, plus
# the standard gaps already established by every prior pairing: CIP-002's
# impact-categorization concept and CIP-003's CIP-Senior-Manager/
# delegation concepts have no SOC 2 analogue (the same gap found in every
# other pairing); CIP-014 (physical Transmission station risk assessment)
# again overlaps least of any standard, with only one part (6.4,
# non-disclosure agreements) finding a real match, via C1.1's
# confidential-information-protection criterion - notably CIP-014-5.2
# (law enforcement contact information), which matched cleanly against
# CIS Controls' explicit 17.2 contact-information Safeguard, has NO
# equally clean SOC 2 match, because SOC 2's closest criteria (P6.5/P6.6)
# are Privacy-category breach-notification requirements, not a general
# "maintain external contact information" criterion the way CIS 17.2 is.
#
# SOC 2's Common Criteria (CC6.4/CC6.5) explicitly cover physical access
# control, unlike CIS Controls v8 (which has almost no physical-security
# coverage, ADR-0025) - this makes CIP-006 (Physical Security) noticeably
# better covered by SOC 2 than by CIS Controls, the opposite pattern from
# every other standard, and a genuinely useful cross-check that this
# pairing isn't just a weaker copy of the CIS Controls one.
#
# As with every other pairing, several NERC CIP parts share the same SOC
# 2 criterion as another part of the same standard (e.g. CIP-009's
# backup-testing parts 2.1/2.2/2.3 all point to A1.3, and CIP-010's
# baseline-configuration parts 1.1-1.5 all point to CC8.1) - this
# reflects SOC 2 being genuinely coarser-grained than NERC CIP in these
# areas, not a duplication error.

