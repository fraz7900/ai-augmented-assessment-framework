# --- NERC CIP <-> NIST CSF 2.0 (ADR-0028, Sprint 15) ---
# Full-text-vs-full-text comparison, the same methodology as the C2M2/
# NIST and NERC CIP/C2M2 pairings above (NOT the weaker title-or-
# statement-only comparison the ISO 27001/SOC 2/PCI DSS pairings had to
# use) - both frameworks' sides are the real, complete subcategory/Part
# text, since both were already fully transcribed (ADR-0010, ADR-0022)
# before this review began.
#
# 107 of 141 NERC CIP practices have a reviewed NIST CSF 2.0 equivalent
# below - the highest hit rate of any pairing reviewed for NERC CIP so
# far (compare: ISO 27001 95/141, CIS Controls 84/141, PCI DSS 80/141,
# SOC 2 60/141), because NIST CSF 2.0's six functions (Govern, Identify,
# Protect, Detect, Respond, Recover) collectively span a genuinely
# comprehensive range of cybersecurity activity, closely matching NERC
# CIP's own broad technical and organizational scope even at the full-
# text level - the same "comprehensive framework finds more real
# matches" pattern the original NIST CSF 2.0 <-> C2M2 pairing (ADR-0019)
# established.
#
# The remaining 34 were reviewed and NOT included, each for a real,
# disclosed reason:
# - CIP-002's impact-categorization concept and CIP-003's CIP-Senior-
#   Manager/delegation concepts have no NIST CSF 2.0 analogue - the same
#   gap found in every other pairing reviewed for NERC CIP.
# - CIP-007's forced-password-rotation-cadence part (5.6) and
#   unsuccessful-authentication-attempt-limiting part (5.7) have no
#   NIST CSF 2.0 subcategory at this level of specificity - the same
#   gap already found for CIS Controls/SOC 2/PCI DSS (current best-
#   practice guidance has moved away from mandatory password rotation,
#   and NIST CSF 2.0's PR.AA series does not name a specific lockout-
#   threshold mechanism).
# - CIP-011's BCSI-reuse and BCSI-disposal parts (2.1, 2.2) have no
#   NIST CSF 2.0 analogue - NIST CSF 2.0 does not have an explicit
#   media-sanitization/data-disposal subcategory at this granularity
#   (unlike, for example, CIS Controls' 3.5 or SOC 2's C1.2), a genuine
#   gap confirmed by direct search of the source text.
# - CIP-014 (physical Transmission station risk assessment) again
#   overlaps least of any standard, the pattern every prior pairing has
#   found - only 4 of its 27 parts matched, and even those (2.4/6.4's
#   NDA-confidentiality parts, 4.3's threat-intelligence part, 5.1's
#   resiliency-measures part) are the same generic-enough-to-transfer
#   concepts every other pairing's CIP-014 matches have been.
#
# Several accepted entries were found by directly searching NIST CSF
# 2.0's real transcribed text for a concept the embedding's top-3
# candidates missed entirely - the same "human review adds value
# beyond the ranking" pattern ADR-0019 established for the original
# NIST CSF 2.0 <-> C2M2 pairing, recurring here because NERC's
# regulatory vocabulary ("Electronic Security Perimeter," "unaffiliated
# verifying entity," "personnel risk assessment") differs enough from
# NIST's own vocabulary ("protected from unauthorized logical access,"
# "identities are proofed") that the embedding under-ranked several
# genuinely strong matches (e.g. CIP-004's personnel-risk-assessment
# parts matched to PR.AA-02's identity-proofing subcategory, which
# never appeared in the embedding's own top-3 for those parts).
#
# As with every other pairing, several NERC CIP parts share the same
# NIST CSF 2.0 subcategory as another part of the same standard (e.g.
# CIP-009's backup-testing parts 1.3/1.4/2.2 all point to PR.DS-11, and
# CIP-013's supply-chain parts 2/3 both point to GV.SC-01) - this
# reflects NIST CSF 2.0 being genuinely coarser-grained than NERC CIP
# in these areas, not a duplication error.

