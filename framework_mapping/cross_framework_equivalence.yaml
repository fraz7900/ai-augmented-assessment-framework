# GENERATED CANDIDATES, HAND-CURATED ACCEPTANCE. Do not hand-edit the
# similarity scores (recompute via backend/scripts/generate_cross_framework_equivalence.py
# if source text changes) — but every entry's presence in this file, and
# its rationale, is a deliberate human judgment, not an automatic
# similarity-threshold cutoff. See docs/adr/ADR-0019-cross-framework-equivalence.md,
# docs/adr/ADR-0023-nerc-cip-cross-framework-equivalence.md, and
# .claude/skills/framework-mapping/SKILL.md point 3: "Cross-framework
# equivalence is additive, not automatic... not inferred by embedding
# similarity alone... embedding similarity can seed a candidate mapping
# for human review; it should not silently become an accepted mapping."
#
# Generic two-sided schema (framework_a/practice_a_id/framework_b/
# practice_b_id) since ADR-0023 — generalized from the original
# c2m2_practice_id/nist_subcategory_id columns once a third framework
# (NERC CIP) had its own equivalence data to represent, exactly the
# evolution ADR-0019's Consequences section predicted would be needed
# "when it actually happens," not built ahead of that need.
#
# --- C2M2 <-> NIST CSF 2.0 (ADR-0019, Sprint 10) ---
# Coverage is deliberately partial: 79 of 106 NIST CSF 2.0 subcategories
# have a reviewed C2M2 equivalent below. The remaining 27 were reviewed
# and NOT included, either because C2M2 has no practice covering that
# specific concept (a real standards gap, e.g. identity proofing,
# data-in-use protection, chain-of-custody/evidence-integrity detail,
# post-incident "new normal" operations) or because the only textually
# similar C2M2 practices were the generic "Management Activities"
# boilerplate every domain repeats near-verbatim (documented procedures /
# adequate resources / up-to-date policies / responsibility-accountability-
# authority / personnel skills / effectiveness evaluated) - accepting one
# domain's copy of that boilerplate over the other nine would misrepresent
# a many-domains-equally-match pattern as a specific equivalence. See
# ADR-0019 for the full list of reviewed-but-excluded subcategories and why.
#
# Several accepted entries below have a LOWER similarity score than
# unaccepted top-3 candidates for the same NIST subcategory - this is
# expected and disclosed, not an error: these are cases the embedding
# ranked lower due to vocabulary difference, but a human reviewer with
# actual knowledge of both frameworks' full text recognized as the
# correct match anyway. This is the exact value human review is required
# to add, per the framework-mapping skill.
#
# --- NERC CIP <-> C2M2 (ADR-0023, Sprint 11) ---
# Coverage is deliberately partial and one-directional: 74 of 141 NERC
# CIP practices have a reviewed C2M2 equivalent below, reviewed against
# C2M2 only (NERC CIP <-> NIST CSF 2.0 is separate, unstarted future
# work, not automatic just because both are now fully transcribed).
# The remaining 67 were reviewed and NOT included, each for a real,
# disclosed reason - see ADR-0023 for the full breakdown by standard.
# Common patterns: CIP-002's impact-categorization concept and CIP-003's
# CIP-Senior-Manager/delegation-of-authority concepts have no C2M2
# analogue at all (confirmed by direct search of the source text, not
# assumed); CIP-005's vendor-remote-access-session parts and CIP-006's
# visitor-control-program parts are similarly absent from C2M2; CIP-007's
# malicious-code-prevention and account-lockout parts have no C2M2
# analogue either (C2M2 has no anti-malware or authentication-lockout
# concept, confirmed by direct search); CIP-014 (physical Transmission
# station risk assessment) overlaps least with C2M2's cyber-focused
# capability model, since it is scoped to physical infrastructure and
# Transmission Owner/Operator risk criteria, not BES Cyber Systems.
#
# Several entries below were found by searching C2M2's actual source
# text for a concept the embedding's top-3 candidates missed entirely
# (e.g. CIP-004's Personnel Risk Assessment parts matched to C2M2's
# WORKFORCE-1 vetting/separation practices, which never appeared in the
# embedding's own top-3 for those parts) - the same "human review adds
# value beyond the ranking" pattern ADR-0019 established, applied here
# more often because NERC CIP's practice text uses more distinctive,
# less-generic vocabulary than NIST CSF 2.0's did. Several accepted
# entries score notably lower than the C2M2<->NIST entries above (as
# low as 0.522) for the same reason: recognized as correct by a
# reviewer who transcribed both frameworks' real text, not by the
# embedding ranking.
#
# A number of NERC CIP parts share the same C2M2 equivalent as another
# part of the same standard (e.g. CIP-009's backup-testing parts 1.3/
# 1.4/2.2 all point to RESPONSE-4b) - this is not duplication error, it
# reflects C2M2 being genuinely coarser-grained than NERC CIP in these
# areas: NERC splits one underlying control concept into several
# distinct, separately-numbered regulatory parts (e.g. "process exists"
# vs. "process is tested" vs. "test uses representative sample") where
# C2M2 has a single practice covering the same overall concept.

