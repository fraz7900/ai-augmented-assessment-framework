# --- NERC CIP <-> CIS Controls v8 (ADR-0025, Sprint 12) ---
# Full-text-vs-full-text comparison, the same methodology as the C2M2 and
# NIST pairings above (NOT the weaker title-only comparison the ISO 27001
# pairing had to use) - CIS Controls v8's side is the real, complete
# Safeguard description text.
#
# 84 of 141 NERC CIP practices have a reviewed CIS Controls equivalent
# below. The remaining 57 were reviewed and NOT included, each for a real,
# disclosed reason, generally following the same gap pattern already
# established by the C2M2 and ISO 27001 pairings:
# - CIP-002's impact-categorization concept (identifying High/Medium/Low
#   impact BES Cyber Systems) and CIP-003's CIP-Senior-Manager naming/
#   delegation-of-authority concepts have no CIS analogue at all, the
#   same gap already documented for the C2M2 and ISO 27001 pairings.
# - CIP-004's personnel-risk-assessment parts (3.1-3.5: criminal history
#   checks, identity confirmation) have no CIS analogue - CIS Controls v8
#   has no personnel-vetting/background-check Safeguard, a real gap this
#   framework does not fill (confirmed by direct search of the source
#   text, not assumed).
# - CIP-006's physical-security-perimeter parts (badge access, visitor
#   escort, alarms, cabling protection) are almost entirely absent from
#   CIS Controls v8, which is essentially IT/cyber-focused with minimal
#   physical-security coverage - a sharper gap here than for ISO 27001,
#   whose Annex A has a dedicated Physical theme. Only the two parts
#   whose underlying concept is generic log/record retention (1.9, 2.3)
#   found a real CIS match.
# - CIP-012's communication-link-availability parts (1.2, 1.3: mitigating
#   loss of, and recovering, the Real-time data link between Control
#   Centers) have no CIS analogue - CIS Controls v8 has no network-link
#   availability/redundancy Safeguard distinct from general data
#   recovery, which is a different concept.
# - CIP-014 (physical Transmission station risk assessment) overlaps
#   least of any standard, the same finding as both prior pairings -
#   only Part 5.2 (law enforcement contact information) matched, because
#   CIS 17.2's contact-information Safeguard explicitly names law
#   enforcement as an example contact, a generic-enough concept to
#   transfer across the physical/cyber domain boundary. Every other
#   CIP-014 part (risk-assessment cadence, unaffiliated verifying-entity
#   selection criteria, transmission-station characteristics) is
#   civil/physical-infrastructure-specific with no cyber-framework
#   analogue in any of the three pairings reviewed so far.
# - A number of procedural/scheduling-only parts one level more specific
#   than any single CIS Safeguard describes were excluded even where a
#   sibling part of the same NERC requirement was accepted (e.g.
#   CIP-007-5.6's password-rotation-cadence requirement was excluded
#   because CIS Controls v8's password Safeguard, 5.2, addresses
#   uniqueness and length, not forced periodic rotation - a genuine
#   substantive difference, not just a wording gap, so forcing the tie
#   would have misrepresented it).
#
# Several accepted entries were found by directly searching CIS
# Controls v8's real transcribed text for a concept the embedding's
# top-3 candidates missed entirely (e.g. CIP-005-1.1's Electronic
# Security Perimeter requirement matched to CIS 12.2's secure-network-
# architecture-and-segmentation Safeguard, which never appeared in the
# embedding's own top-3 for that part) - the same "human review adds
# value beyond the ranking" pattern established by the C2M2 and ISO
# 27001 pairings, here because NERC CIP's networking/perimeter
# vocabulary ("Electronic Security Perimeter", "Electronic Access
# Point") differs enough from CIS's own networking vocabulary
# ("secure network architecture", "segmentation") that the embedding
# under-ranked several genuinely strong matches.
#
# As with the C2M2 pairing, several NERC CIP parts share the same CIS
# Safeguard as another part of the same standard (e.g. CIP-009's
# backup-testing parts 2.1/2.2/2.3 all point to CIS 11.5, and
# CIP-010's baseline-configuration parts 1.1/1.2/1.3 all point to CIS
# 4.1) - this reflects CIS Controls v8 being genuinely coarser-grained
# than NERC CIP in these areas, not a duplication error: NERC splits
# one underlying control concept into several distinct, separately-
# numbered regulatory parts where CIS has a single Safeguard covering
# the same overall concept.

