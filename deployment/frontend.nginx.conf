# react-router uses client-side routing - a direct browser visit (or
# refresh) on e.g. /assessments/<id>/evidence has no matching file on disk,
# so it must fall back to index.html and let the client-side router resolve
# it, rather than nginx returning a 404.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
